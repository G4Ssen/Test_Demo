version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  karate-tests:
    build:
      context: .
      dockerfile: Dockerfile.karate
    depends_on:
      api:
        condition: service_healthy
    environment:
      - KARATE_ENV=dev
    command: mvn clean test
