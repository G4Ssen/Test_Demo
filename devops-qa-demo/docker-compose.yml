version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - devops_net

  db:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devopspassword
      POSTGRES_DB: devops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops_net

  forgejo:
    image: codeberg.org/forgejo/forgejo:1.21
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=db:5432
      - FORGEJO__database__NAME=devops_db
      - FORGEJO__database__USER=devops
      - FORGEJO__database__PASSWD=devopspassword
      - FORGEJO__server__DOMAIN=git.localhost
      - FORGEJO__server__ROOT_URL=http://git.localhost/
    volumes:
      - forgejo_data:/data
    ports:
      - "222:22"
    depends_on:
      - db
    networks:
      - devops_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forgejo.rule=Host(`git.localhost`)"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - PASSWORD=demopassword
      - SUDO_PASSWORD=demopassword
    volumes:
      - code_server_data:/config
      # Mount the host workspace into the IDE
      - .:/workspace 
    networks:
      - devops_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.codeserver.rule=Host(`ide.localhost`)"
      - "traefik.http.services.codeserver.loadbalancer.server.port=8443"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - devops_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prom.localhost`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - devops_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  forgejo_data:
  code_server_data:
  prometheus_data:
  grafana_data:

networks:
  devops_net:
    driver: bridge
