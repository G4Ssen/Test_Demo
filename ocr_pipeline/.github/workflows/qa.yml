name: QA Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Security Scans ────────────────────────────────────────────────────────
  security-scans:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability & configuration scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Build local Docker image
        working-directory: ocr_pipeline
        run: |
          docker build -t ocr-pipeline:latest .

      - name: Run Trivy vulnerability scanner on OCR pipeline image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ocr-pipeline:latest'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ── Functional API Tests ──────────────────────────────────────────────────
  api-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tesseract
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        working-directory: ocr_pipeline
        run: pip install -r requirements.txt

      - name: Generate Karate test data PDFs
        working-directory: ocr_pipeline
        run: python generate_testdata.py

      - name: Start FastAPI server
        working-directory: ocr_pipeline
        env:
          REDIS_URL: redis://localhost:6379/0
          MOCK_LLM: "true"
          OPENAI_API_KEY: "mock"
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5        # wait for server to be ready
          curl -f http://localhost:8000/health

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run Karate API Tests
        working-directory: ocr_pipeline/tests/karate
        env:
          MOCK_LLM: "true"
        run: mvn test -Dkarate.env=ci

      - name: Publish Karate HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-report
          path: ocr_pipeline/tests/karate/target/karate-reports/

  # ── Performance Tests (main branch only) ─────────────────────────────────
  perf-tests:
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tesseract
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        working-directory: ocr_pipeline
        run: pip install -r requirements.txt

      - name: Generate Karate test data PDFs
        working-directory: ocr_pipeline
        run: python generate_testdata.py

      - name: Start FastAPI server (in-memory, mock LLM)
        working-directory: ocr_pipeline
        env:
          REDIS_URL: memory://
          MOCK_LLM: "true"
          OPENAI_API_KEY: "mock"
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run Gatling Performance Tests
        working-directory: ocr_pipeline/tests/karate
        run: mvn gatling:test

      - name: Publish Gatling Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gatling-report
          path: ocr_pipeline/tests/karate/target/gatling/
